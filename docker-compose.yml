# ============================================
# Docker Compose — Admin Full Stack
# ============================================

services:
  # ---- Frontend: Development ----
  frontend-dev:
    build:
      context: .
      dockerfile: ./docker_images/Dockerfile
      target: development
    container_name: admin-frontend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - admin-net

  # ---- Frontend: Production ----
  frontend-prod:
    build:
      context: .
      dockerfile: ./docker_images/Dockerfile
      target: production
    container_name: admin-frontend-prod
    ports:
      - "3030:80"
    networks:
      - admin-net

